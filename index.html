<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#5a4bea" />
  <title>SKT 사전예약 혜택 쿠폰</title>
  <style>
    :root {
      --ink: #23204a;
      --ink-soft: #5b5980;
      --point: #5a4bea;
      --point2: #6c5ce7;
      --blue: #4c6ef5;
      --card: #ffffff;
      --line: #e7e6f5;
      --err: #e0466b;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body { margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
        "Apple SD Gothic Neo", "Malgun Gothic", "Noto Sans KR", sans-serif;
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      background:
        radial-gradient(120% 90% at 15% 5%, #f1ecff 0%, rgba(241,236,255,0) 55%),
        radial-gradient(120% 90% at 90% 15%, #e7f0ff 0%, rgba(231,240,255,0) 55%),
        linear-gradient(165deg, #f3f1ff 0%, #f6f2ff 45%, #eef3ff 100%);
      background-attachment: fixed;
    }

    .wrap {
      width: 100%;
      max-width: 468px;
      padding: 24px 16px 40px;
    }

    /* ---------- soft floating blobs ---------- */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(6px);
      opacity: 0.5;
      z-index: 0;
      pointer-events: none;
    }
    .blob.b1 { width: 150px; height: 150px; top: -30px; right: -30px;
      background: radial-gradient(circle at 35% 30%, #d7c8ff, #b9a6ff); }
    .blob.b2 { width: 120px; height: 120px; bottom: 40px; left: -34px;
      background: radial-gradient(circle at 35% 30%, #c8e0ff, #9fc2ff); }

    .wrap > * { position: relative; z-index: 1; }

    /* ---------- brand ---------- */
    .brand {
      display: flex;
      align-items: center;
      gap: 9px;
      justify-content: center;
      margin-bottom: 18px;
    }
    .brand .mark {
      font-weight: 800;
      letter-spacing: -0.5px;
      font-size: 15px;
      color: #fff;
      background: linear-gradient(135deg, var(--point), var(--blue));
      padding: 6px 12px;
      border-radius: 12px;
      box-shadow: 0 6px 14px rgba(90, 75, 234, 0.35);
    }
    .brand .sub { font-size: 13px; color: var(--ink-soft); font-weight: 600; }

    /* ---------- shared screen ---------- */
    .screen { display: none; }
    .screen.active { display: block; animation: fade .45s ease; }
    @keyframes fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

    .headline {
      text-align: center;
      font-size: 25px;
      line-height: 1.28;
      font-weight: 800;
      letter-spacing: -0.4px;
      margin: 4px 0 10px;
      background: linear-gradient(120deg, #4b3fd6, #6a5cf0 55%, #4c6ef5);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .desc {
      text-align: center;
      font-size: 14.5px;
      line-height: 1.6;
      color: var(--ink-soft);
      margin: 0 auto 22px;
      max-width: 320px;
    }

    /* ---------- main character image ---------- */
    .main-char {
      display: block;
      width: 210px;
      max-width: 62%;
      height: auto;
      margin: 4px auto 16px;
      filter: drop-shadow(0 16px 24px rgba(60, 52, 140, 0.22));
    }

    /* ---------- password box ---------- */
    .panel {
      background: rgba(255,255,255,.82);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 22px 20px 24px;
      box-shadow: 0 16px 40px rgba(60,52,140,.10);
      backdrop-filter: blur(6px);
    }
    .pw-label {
      text-align: center; font-size: 13.5px; font-weight: 600;
      color: var(--ink-soft); margin-bottom: 14px;
    }
    .pw-input {
      width: 100%; text-align: center;
      font-size: 20px; letter-spacing: 3px; font-weight: 700;
      padding: 14px 14px; border-radius: 14px;
      border: 1.6px solid var(--line); background: #fff; color: var(--ink);
      outline: none; transition: border-color .2s, box-shadow .2s;
    }
    .pw-input::placeholder { letter-spacing: 1px; font-weight: 500; color: #b4b2cc; }
    .pw-input:focus { border-color: var(--point);
      box-shadow: 0 0 0 4px rgba(90,75,234,.14); }
    .pw-input.shake { animation: shake .4s; border-color: var(--err); }
    @keyframes shake {
      0%,100%{transform:translateX(0)} 20%{transform:translateX(-7px)}
      40%{transform:translateX(7px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)}
    }
    .error {
      display: none; text-align: center; color: var(--err);
      font-size: 13.5px; font-weight: 600; margin-top: 12px;
    }
    .error.show { display: block; }

    .btn {
      display: block; width: 100%; border: none; cursor: pointer;
      color: #fff; font-size: 16px; font-weight: 800; letter-spacing: -.2px;
      padding: 15px; border-radius: 15px; margin-top: 16px;
      background: linear-gradient(135deg, var(--point) 0%, var(--blue) 100%);
      box-shadow: 0 12px 24px rgba(76,110,245,.32);
      transition: transform .12s ease, box-shadow .2s ease;
    }
    .btn:active { transform: translateY(2px) scale(.99);
      box-shadow: 0 6px 14px rgba(76,110,245,.30); }

    /* ---------- coupon screen ---------- */
    .coupon-shell {
      border-radius: 26px;
      overflow: hidden;
      box-shadow: 0 22px 50px rgba(60,52,140,.20);
    }
    #couponCanvas { display: block; width: 100%; height: auto; }

    .save-hint {
      text-align: center; font-size: 12.5px; color: var(--ink-soft);
      margin-top: 12px; line-height: 1.5;
    }
    .disclaimer {
      margin-top: 14px;
      background: rgba(255,255,255,.7);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px 16px;
      font-size: 11.5px;
      line-height: 1.65;
      color: #7d7ba0;
    }
    .disclaimer b { color: #64628a; font-weight: 700; }
    .relink {
      display: block; text-align: center; margin-top: 16px;
      font-size: 12.5px; color: var(--ink-soft);
      background: none; border: none; cursor: pointer; width: 100%;
      text-decoration: underline; text-underline-offset: 3px;
    }
  </style>
</head>
<body>
  <div class="blob b1"></div>
  <div class="blob b2"></div>

  <div class="wrap">
    <div class="brand">
      <span class="mark">SKT</span>
      <span class="sub">사전예약 혜택 안내</span>
    </div>

    <!-- ================= PASSWORD SCREEN ================= -->
    <section id="lockScreen" class="screen active">
      <div class="headline">Catch the Card.<br />Switch to SKT.</div>
      <p class="desc">포켓몬 카드 당첨 고객님께 드리는<br />SKT 사전예약 혜택 쿠폰입니다.</p>

      <img class="main-char" src="main-character.png" alt="SKT 매니저 캐릭터" />

      <div class="panel">
        <div class="pw-label">매장 직원이 안내한 비밀번호를 입력해 주세요.</div>
        <input
          id="pwInput"
          class="pw-input"
          type="password"
          inputmode="text"
          autocomplete="off"
          autocapitalize="off"
          spellcheck="false"
          placeholder="비밀번호 입력"
        />
        <button id="pwBtn" class="btn" type="button">확인</button>
        <div id="pwError" class="error">비밀번호를 다시 확인해 주세요.</div>
      </div>
    </section>

    <!-- ================= COUPON SCREEN ================= -->
    <section id="couponScreen" class="screen">
      <div class="coupon-shell">
        <canvas id="couponCanvas" width="1080" height="1080" role="img"
          aria-label="SKT 사전예약 혜택 쿠폰"></canvas>
      </div>

      <button id="saveBtn" class="btn" type="button">쿠폰 이미지 저장하기</button>
      <p class="save-hint">저장 또는 공유 화면에서 ‘이미지 저장’을 선택해 주세요.</p>

      <div class="disclaimer">
        <b>안내</b> · 실제 혜택 적용은 당첨 문자, 매장 방문일, 사전예약일 및 개통 조건을
        전산 확인 후 적용됩니다. 본 쿠폰 이미지만으로 혜택 적용이 확정되는 것은 아니며,
        조건 미충족 시 혜택 적용이 제한될 수 있습니다.
      </div>

      <button id="backBtn" class="relink" type="button">처음 화면으로 돌아가기</button>
    </section>
  </div>

  <script>
    (function () {
      "use strict";

      var PASSWORD = "SKT114";

      var lockScreen = document.getElementById("lockScreen");
      var couponScreen = document.getElementById("couponScreen");
      var pwInput = document.getElementById("pwInput");
      var pwBtn = document.getElementById("pwBtn");
      var pwError = document.getElementById("pwError");
      var saveBtn = document.getElementById("saveBtn");
      var backBtn = document.getElementById("backBtn");
      var canvas = document.getElementById("couponCanvas");

      var couponRendered = false;

      // character.png (transparent PNG in the same folder) is composited into
      // the coupon canvas so it is included in the saved image.
      var charImg = new Image();
      var charReady = false;
      charImg.onload = function () {
        charReady = true;
        if (couponRendered) drawCoupon();
      };
      charImg.onerror = function () { charReady = false; };
      charImg.src = "character.png";

      /* ---------------- password flow ---------------- */
      function tryUnlock() {
        var val = pwInput.value.trim();
        if (val === PASSWORD) {
          pwError.classList.remove("show");
          openCoupon();
        } else {
          pwError.classList.add("show");
          pwInput.classList.remove("shake");
          void pwInput.offsetWidth; // reflow to restart animation
          pwInput.classList.add("shake");
          pwInput.select();
        }
      }

      function openCoupon() {
        if (!couponRendered) {
          drawCoupon();
          couponRendered = true;
        }
        lockScreen.classList.remove("active");
        couponScreen.classList.add("active");
        window.scrollTo({ top: 0, behavior: "auto" });
      }

      function goBack() {
        couponScreen.classList.remove("active");
        lockScreen.classList.add("active");
        pwInput.value = "";
        pwError.classList.remove("show");
      }

      pwBtn.addEventListener("click", tryUnlock);
      pwInput.addEventListener("keydown", function (e) {
        if (e.key === "Enter") { e.preventDefault(); tryUnlock(); }
      });
      pwInput.addEventListener("input", function () {
        pwError.classList.remove("show");
      });
      backBtn.addEventListener("click", goBack);

      /* ---------------- canvas helpers ---------------- */
      function roundRect(ctx, x, y, w, h, r) {
        if (typeof r === "number") r = { tl: r, tr: r, br: r, bl: r };
        ctx.beginPath();
        ctx.moveTo(x + r.tl, y);
        ctx.lineTo(x + w - r.tr, y);
        ctx.arcTo(x + w, y, x + w, y + r.tr, r.tr);
        ctx.lineTo(x + w, y + h - r.br);
        ctx.arcTo(x + w, y + h, x + w - r.br, y + h, r.br);
        ctx.lineTo(x + r.bl, y + h);
        ctx.arcTo(x, y + h, x, y + h - r.bl, r.bl);
        ctx.lineTo(x, y + r.tl);
        ctx.arcTo(x, y, x + r.tl, y, r.tl);
        ctx.closePath();
      }

      function wrapText(ctx, text, maxWidth) {
        var chars = text.split("");
        var lines = [];
        var line = "";
        for (var i = 0; i < chars.length; i++) {
          var test = line + chars[i];
          if (ctx.measureText(test).width > maxWidth && line !== "") {
            lines.push(line);
            line = chars[i] === " " ? "" : chars[i];
          } else {
            line = test;
          }
        }
        if (line) lines.push(line);
        return lines;
      }

      var FONT = '-apple-system, "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", "Noto Sans KR", sans-serif';
      function f(weight, size) { return weight + " " + size + "px " + FONT; }

      /* ---------------- coupon ---------------- */
      function drawCoupon() {
        var ctx = canvas.getContext("2d");
        var W = canvas.width, H = canvas.height;

        ctx.clearRect(0, 0, W, H);

        // background
        var bg = ctx.createLinearGradient(0, 0, W, H);
        bg.addColorStop(0, "#eee9ff");
        bg.addColorStop(0.5, "#f2edff");
        bg.addColorStop(1, "#e7f0ff");
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, W, H);

        // decorative soft blobs
        function blob(x, y, r, c1, c2) {
          var g = ctx.createRadialGradient(x - r * 0.3, y - r * 0.3, r * 0.1, x, y, r);
          g.addColorStop(0, c1);
          g.addColorStop(1, c2);
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.arc(x, y, r, 0, Math.PI * 2);
          ctx.fill();
        }
        blob(80, 90, 150, "rgba(200,182,255,0.5)", "rgba(200,182,255,0)");
        blob(1010, 120, 140, "rgba(170,200,255,0.5)", "rgba(170,200,255,0)");
        blob(990, 990, 150, "rgba(206,190,255,0.45)", "rgba(206,190,255,0)");

        // ---- card (wider, less side margin) ----
        var cardX = 28, cardY = 28, cardW = W - 56, cardH = H - 56;
        var cardR = 60;
        ctx.save();
        ctx.shadowColor = "rgba(60,52,140,0.20)";
        ctx.shadowBlur = 46;
        ctx.shadowOffsetY = 20;
        var cg = ctx.createLinearGradient(0, cardY, 0, cardY + cardH);
        cg.addColorStop(0, "#ffffff");
        cg.addColorStop(1, "#f8f7ff");
        ctx.fillStyle = cg;
        roundRect(ctx, cardX, cardY, cardW, cardH, cardR);
        ctx.fill();
        ctx.restore();

        ctx.strokeStyle = "rgba(90,75,234,0.10)";
        ctx.lineWidth = 2;
        roundRect(ctx, cardX + 1, cardY + 1, cardW - 2, cardH - 2, cardR - 1);
        ctx.stroke();

        var cx = W / 2;
        var padL = 72;

        // ---- character image, top-right (clipped to card) ----
        if (charReady && charImg.naturalWidth > 0) {
          ctx.save();
          roundRect(ctx, cardX, cardY, cardW, cardH, cardR);
          ctx.clip();
          var cw = 486, ch = 486;
          var chX = cardX + cardW - cw + 8;
          var chY = 30;
          ctx.drawImage(charImg, chX, chY, cw, ch);
          ctx.restore();
        }

        // ---- title pill (top-left) ----
        ctx.font = f(700, 28);
        var pillText = "SKT 사전예약 혜택 쿠폰";
        var ptw = ctx.measureText(pillText).width;
        var pillW = ptw + 54, pillH = 60, pillX = padL, pillY = 70;
        var pg = ctx.createLinearGradient(pillX, 0, pillX + pillW, 0);
        pg.addColorStop(0, "#5a4bea");
        pg.addColorStop(1, "#4c6ef5");
        ctx.fillStyle = pg;
        roundRect(ctx, pillX, pillY, pillW, pillH, 30);
        ctx.fill();
        ctx.fillStyle = "#ffffff";
        ctx.textAlign = "left";
        ctx.textBaseline = "middle";
        ctx.fillText(pillText, pillX + 27, pillY + pillH / 2 + 1);

        // ---- headline (left aligned, clear of character) ----
        ctx.textBaseline = "alphabetic";
        ctx.textAlign = "left";
        var copyGrad = ctx.createLinearGradient(padL, 0, padL + 520, 0);
        copyGrad.addColorStop(0, "#4b3fd6");
        copyGrad.addColorStop(0.55, "#6a5cf0");
        copyGrad.addColorStop(1, "#4c6ef5");
        ctx.fillStyle = copyGrad;
        ctx.font = f(800, 56);
        ctx.fillText("Catch the Card.", padL, 250);
        ctx.fillText("Switch to SKT.", padL, 318);

        // ---- benefit boxes (bigger, wider, stronger hierarchy) ----
        function benefit(y, amount, cond) {
          var bx = padL, bw = W - padL * 2, bh = 156, br = 32;
          var bgr = ctx.createLinearGradient(bx, y, bx + bw, y);
          bgr.addColorStop(0, "#f3f0ff");
          bgr.addColorStop(1, "#eaf1ff");
          ctx.save();
          ctx.shadowColor = "rgba(90,75,234,0.12)";
          ctx.shadowBlur = 20;
          ctx.shadowOffsetY = 9;
          ctx.fillStyle = bgr;
          roundRect(ctx, bx, y, bw, bh, br);
          ctx.fill();
          ctx.restore();

          // left accent bar
          var ag = ctx.createLinearGradient(0, y, 0, y + bh);
          ag.addColorStop(0, "#5a4bea");
          ag.addColorStop(1, "#4c6ef5");
          ctx.fillStyle = ag;
          roundRect(ctx, bx + 30, y + 30, 10, bh - 60, 5);
          ctx.fill();

          // amount (emphasized)
          ctx.textAlign = "left";
          ctx.textBaseline = "alphabetic";
          ctx.fillStyle = "#3a2fc0";
          ctx.font = f(800, 68);
          ctx.fillText(amount, bx + 66, y + 86);
          // condition
          ctx.fillStyle = "#6f6d93";
          ctx.font = f(600, 30);
          ctx.fillText(cond, bx + 68, y + 130);
        }
        benefit(548, "10만원 할인", "매장 방문 당일 사전예약 후 개통 시");
        benefit(724, "5만원 할인", "방문 이후 사전예약 후 개통 시");

        // ---- 사용기한 pill (centered) ----
        ctx.font = f(700, 28);
        var dueText = "사용기한  2026.XX.XX까지";
        var dtw = ctx.measureText(dueText).width;
        var dpW = dtw + 60, dpH = 58, dpX = cx - dpW / 2, dpY = 906;
        ctx.fillStyle = "#efeaff";
        roundRect(ctx, dpX, dpY, dpW, dpH, 29);
        ctx.fill();
        ctx.fillStyle = "#5a4bea";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(dueText, cx, dpY + dpH / 2 + 1);

        // ---- 사용 안내 ----
        ctx.textBaseline = "alphabetic";
        ctx.textAlign = "center";
        ctx.fillStyle = "#7d7ba0";
        ctx.font = f(500, 27);
        var guide = "사용 시 본 쿠폰 이미지와 포켓몬 카드 당첨 문자를 함께 제시해 주세요.";
        var glines = wrapText(ctx, guide, cardW - 170);
        var gy = 995;
        for (var i = 0; i < glines.length; i++) {
          ctx.fillText(glines[i].trim(), cx, gy + i * 36);
        }
      }

      /* ---------------- save / share ---------------- */
      function canvasToBlob() {
        return new Promise(function (resolve) {
          if (canvas.toBlob) {
            canvas.toBlob(function (b) { resolve(b); }, "image/png");
          } else {
            var data = canvas.toDataURL("image/png").split(",")[1];
            var bin = atob(data);
            var arr = new Uint8Array(bin.length);
            for (var i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
            resolve(new Blob([arr], { type: "image/png" }));
          }
        });
      }

      function downloadBlob(blob) {
        var url = URL.createObjectURL(blob);
        var a = document.createElement("a");
        a.href = url;
        a.download = "SKT-사전예약-혜택-쿠폰.png";
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(function () { URL.revokeObjectURL(url); }, 1500);
      }

      saveBtn.addEventListener("click", function () {
        saveBtn.disabled = true;
        var original = saveBtn.textContent;
        saveBtn.textContent = "저장 준비 중…";

        canvasToBlob().then(function (blob) {
          var file = null;
          try {
            file = new File([blob], "SKT-사전예약-혜택-쿠폰.png", { type: "image/png" });
          } catch (e) { file = null; }

          var canUseShare =
            file &&
            navigator.share &&
            navigator.canShare &&
            navigator.canShare({ files: [file] });

          if (canUseShare) {
            navigator
              .share({ files: [file], title: "SKT 사전예약 혜택 쿠폰" })
              .catch(function (err) {
                if (err && err.name === "AbortError") return; // user cancelled
                downloadBlob(blob);
              })
              .finally(function () {
                saveBtn.disabled = false;
                saveBtn.textContent = original;
              });
          } else {
            downloadBlob(blob);
            saveBtn.disabled = false;
            saveBtn.textContent = original;
          }
        });
      });
    })();
  </script>
</body>
</html>
