<!DOCTYPE html>
<!--
  ===========================================================================
  기프트 배포 매장 안내 페이지
  - 서버 없이 이 파일(index.html) 하나만으로 동작합니다.
  - GitHub Pages 또는 Cloudflare Pages에 그대로 올리면 됩니다.
  - 비개발자분이 수정해야 할 곳은 아래 "★" 표시를 따라가시면 됩니다.
  ===========================================================================
-->
<html lang="ko">
<head>
  <!-- 한글이 깨지지 않도록 UTF-8 설정 (절대 지우지 마세요) -->
  <meta charset="UTF-8" />
  <!-- 모바일 화면에 맞춰 보이도록 하는 설정 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>기프트 배포 매장 안내</title>

  <style>
    /* =====================================================================
       디자인(색상/여백/글꼴 크기 등) 설정 영역
       - 색을 바꾸고 싶으면 아래 색상 코드(#으로 시작하는 값)만 바꾸면 됩니다.
       ===================================================================== */

    /* 기본 여백 초기화 */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* 모바일에서 가로 스크롤이 생기지 않도록 방지 */
    html, body {
      width: 100%;
      overflow-x: hidden;
    }

    body {
      /* 배경: 연한 회색 계열 */
      background-color: #f2f4f6;
      /* 시스템 기본 글꼴 사용 (외부 폰트 파일 사용 안 함) */
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic",
        "맑은 고딕", sans-serif;
      color: #222;
      line-height: 1.6;
      /* 모바일에서 자동 글자 크기 조정 방지 */
      -webkit-text-size-adjust: 100%;
      /* 긴 매장명/주소가 화면 밖으로 넘치지 않고 자동 줄바꿈되도록 */
      word-break: break-word;
      overflow-wrap: break-word;
    }

    /* 전체 내용을 가운데로 모으고 최대 폭을 제한 */
    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    /* 상단 제목 영역 */
    header {
      text-align: center;
      padding: 8px 0 16px;
    }

    header h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a1a;
      letter-spacing: -0.3px;
    }

    /* 안내 문구 */
    .intro {
      background-color: #ffffff;
      border: 1px solid #e5e8eb;
      border-radius: 12px;
      padding: 16px 18px;
      margin-bottom: 16px;
      font-size: 15px;
      color: #444;
      white-space: pre-line; /* 줄바꿈(엔터)을 그대로 표시 */
    }

    /* 검색창 영역 */
    .search-box {
      position: relative;
      margin-bottom: 14px;
    }

    .search-box input {
      width: 100%;
      padding: 14px 16px;
      font-size: 16px; /* 16px 이상이면 모바일에서 자동 확대가 안 됨 */
      border: 1px solid #d5d9de;
      border-radius: 12px;
      background-color: #ffffff;
      outline: none;
    }

    .search-box input:focus {
      border-color: #2b6cff;
      box-shadow: 0 0 0 3px rgba(43, 108, 255, 0.12);
    }

    /* 검색 결과 개수 */
    .result-count {
      font-size: 14px;
      color: #5b6573;
      margin-bottom: 12px;
      padding: 0 2px;
    }

    .result-count b {
      color: #2b6cff;
    }

    /* 매장 카드 목록 */
    .store-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* 매장 카드 1개 */
    .store-card {
      background-color: #ffffff;
      border: 1px solid #e5e8eb;
      border-radius: 12px;
      padding: 16px 18px;
    }

    .store-card .name {
      font-size: 16px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 4px;
    }

    .store-card .addr {
      font-size: 14px;
      color: #5b6573;
    }

    /* 검색 결과가 없을 때 보이는 안내 */
    .empty {
      background-color: #ffffff;
      border: 1px dashed #cfd5dc;
      border-radius: 12px;
      padding: 28px 18px;
      text-align: center;
      color: #8a939e;
      font-size: 15px;
    }

    /* 하단 유의사항 */
    footer {
      margin-top: 24px;
      padding: 16px 18px;
      background-color: #eceff2;
      border-radius: 12px;
      font-size: 13px;
      color: #6b7480;
      white-space: pre-line; /* 줄바꿈(엔터)을 그대로 표시 */
    }

    footer .notice-title {
      font-weight: 700;
      color: #5b6573;
      margin-bottom: 6px;
      font-size: 13px;
    }
  </style>
</head>

<body>
  <div class="wrap">

    <!-- ★ 수정 위치 1: 상단 제목 -->
    <header>
      <h1>기프트 배포 매장 안내</h1>
    </header>

    <!-- ★ 수정 위치 2: 안내 문구 (엔터로 줄바꿈하면 그대로 보입니다) -->
    <p class="intro">기프트는 아래 대상 매장에서 배포됩니다.
매장명 또는 주소를 검색해 가까운 배포 매장을 확인해 주세요.</p>

    <!-- 검색창 -->
    <div class="search-box">
      <input
        type="text"
        id="searchInput"
        placeholder="매장명 또는 주소를 검색하세요"
        autocomplete="off"
      />
    </div>

    <!-- 검색 결과 개수가 표시되는 자리 -->
    <div class="result-count" id="resultCount"></div>

    <!-- 매장 카드들이 자동으로 채워지는 자리 -->
    <div class="store-list" id="storeList"></div>

    <!-- ★ 수정 위치 4: 하단 유의사항 (엔터로 줄바꿈하면 그대로 보입니다) -->
    <footer>
      <div class="notice-title">유의사항</div>
유의사항 문구 삽입 예정
    </footer>

  </div>

  <script>
    /* =====================================================================
       ★ 수정 위치 3: 매장 데이터
       ---------------------------------------------------------------------
       - 아래 stores 배열 안에 매장을 한 줄씩 넣으면 됩니다.
       - 형식:  { name: "매장명", addr: "주소" },
       - 매장명과 주소는 반드시 큰따옴표(" ")로 감싸고, 끝에 쉼표(,)를 붙이세요.
       - 매장을 추가하려면 줄을 복사해서 아래에 더 넣으면 됩니다.
       - 나중에 500개로 교체할 때도 이 배열 내용만 통째로 바꾸면 됩니다.

       ※ 아래 데이터는 store_test.csv의 실제 10개 매장입니다.
       ===================================================================== */
    const stores = [
      { name: "PS&M (광명사거리역점)", addr: "경기 광명시 광명로 894-1 (광명동)" },
      { name: "PS&M (IFC점)", addr: "서울 영등포구 국제금융로 10 (여의도동) IFC 스트리트몰" },
      { name: "미래대리점 장안직영점", addr: "서울 동대문구 장한로 10 (장안동)" },
      { name: "렉스대리점 본점", addr: "부산 북구 금곡대로 287, 107호 (화명동)" },
      { name: "라온대리점 재송직영점", addr: "부산 해운대구 재반로 89 (재송동)" },
      { name: "선영대리점 장흥점", addr: "전남 장흥군 장흥읍 중앙로 37-6" },
      { name: "고흥대리점 고흥중앙점", addr: "전남 고흥군 고흥읍 여산당촌길 10" },
      { name: "제주광양대리점 중앙로 본점", addr: "제주 제주시 중앙로 69-1 (이도일동)" },
      { name: "한올대리점 복수점", addr: "대전 서구 복수동로 53 (복수동)" },
      { name: "한음대리점 하나분평점", addr: "충북 청주시 서원구 분평로 36 (분평동, 드림빌딩)" }
    ];

    /* =====================================================================
       아래는 검색/표시 기능 코드입니다.
       (특별한 경우가 아니면 수정하지 않으셔도 됩니다.)
       ===================================================================== */

    // 화면 요소 가져오기
    const searchInput = document.getElementById("searchInput");
    const storeList = document.getElementById("storeList");
    const resultCount = document.getElementById("resultCount");

    // HTML 특수문자를 안전하게 표시하기 위한 처리
    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    // 매장 목록을 화면에 그리는 함수
    function render(list) {
      // 검색 결과 개수 표시
      resultCount.innerHTML = "검색 결과 <b>" + list.length + "</b>개";

      // 결과가 없을 때 안내 문구 표시
      if (list.length === 0) {
        storeList.innerHTML =
          '<div class="empty">검색 결과가 없습니다. 매장명 또는 지역명을 다시 입력해 주세요.</div>';
        return;
      }

      // 각 매장을 카드 형태로 표시
      let html = "";
      for (const store of list) {
        html +=
          '<div class="store-card">' +
          '<div class="name">' + escapeHtml(store.name) + "</div>" +
          '<div class="addr">' + escapeHtml(store.addr) + "</div>" +
          "</div>";
      }
      storeList.innerHTML = html;
    }

    // 검색어로 매장을 걸러내는 함수 (매장명 + 주소 모두 검색)
    function search(keyword) {
      const word = keyword.trim().toLowerCase();

      // 검색어가 비어 있으면 전체 매장을 보여줌
      if (word === "") {
        render(stores);
        return;
      }

      const filtered = stores.filter(function (store) {
        const target = (store.name + " " + store.addr).toLowerCase();
        return target.includes(word);
      });

      render(filtered);
    }

    // 검색창에 글자를 입력할 때마다 실시간으로 검색 (서버 요청 없음)
    searchInput.addEventListener("input", function () {
      search(searchInput.value);
    });

    // 페이지가 처음 열릴 때 전체 매장 목록을 표시
    render(stores);
  </script>
</body>
</html>
